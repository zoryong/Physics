<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>역학과 에너지 연습과제 - 01</title>
<meta name="description" content="슬기로운 학교생활 - 퀴즈 생성기로 만든 자동 채점 퀴즈">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&family=JetBrains+Mono:wght@600;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">

<script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] },
    svg: { fontCache: 'global' }
  };
</script>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

:root{
  --ink:#1B2430; --ink-soft:#57616F; --line:#E2E6EB; --paper:#F6F7F9; --card:#FFFFFF;
  --navy:#213863; --navy-deep:#152540; --teal:#0F8A82; --teal-soft:#E3F4F1;
  --amber:#C8791C; --amber-soft:#FBF0DF; --rose:#B8465A; --rose-soft:#FBEAEC;
  --violet:#6E56A6; --violet-soft:#EEEAF7; --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;line-height:1.5;padding-bottom:60px;}
header{background:linear-gradient(155deg,var(--navy-deep) 0%,var(--navy) 62%,#2B4C7E 100%);color:#fff;padding:34px 24px 40px;text-align:center;}
header .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#9FB3D6;font-weight:700;margin-bottom:8px;}
header h1{margin:0 0 8px;font-size:clamp(20px,4vw,27px);font-weight:900;letter-spacing:-.01em;}
header p{margin:0;color:#C7D4E8;font-size:13.5px;}
.wrap{max-width:760px;margin:0 auto;padding:28px 16px 0;}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:18px;box-shadow:0 1px 2px rgba(21,37,64,.04);}
.panel h2{font-size:16px;font-weight:800;margin:0 0 6px;}
.panel .sub{font-size:13px;color:var(--ink-soft);margin:0 0 18px;}
.start-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;}
.field input{width:100%;padding:11px 12px;border:1px solid #C7CEDA;border-radius:9px;font-size:14.5px;font-family:inherit;}
.field input:focus{outline:2px solid var(--teal);outline-offset:1px;border-color:var(--teal);}
.err-msg{color:var(--rose);font-size:12.5px;margin-bottom:10px;min-height:1em;}
.google-signin-btn-wrap{display:flex;justify-content:center;padding:8px 0 4px;}
.gate-err{
  margin-top:14px;padding:12px 14px;background:var(--rose-soft);border:1px solid #E6B7C0;
  border-radius:9px;color:#7A2334;font-size:13px;line-height:1.6;text-align:center;font-weight:600;
}
.btn{appearance:none;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:14.5px;color:#fff;background:var(--navy);padding:13px 18px;border-radius:10px;width:100%;}
.btn:hover{background:var(--navy-deep);}
.btn.teal{background:var(--teal);}
.btn.teal:hover{background:#0C7069;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
@media(max-width:520px){.start-row{grid-template-columns:1fr;}}

.quiz-progress-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;position:sticky;top:0;background:var(--card);padding:6px 0;z-index:5;}
.quiz-progress-track{flex:1;height:8px;background:var(--line);border-radius:99px;overflow:hidden;}
.quiz-progress-fill{height:100%;background:var(--teal);width:0%;transition:width .2s;}
.quiz-progress-text{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--ink-soft);white-space:nowrap;}
.print-btn{margin-bottom:14px;}

.solution-upload-box{border:1.5px dashed #C7CEDA;border-radius:12px;padding:16px 18px;margin:20px 0;background:#FAFBFC;}
.solution-upload-box label{display:block;font-size:13.5px;font-weight:700;margin-bottom:5px;}
.solution-upload-hint{font-size:12px;color:var(--ink-soft);margin-bottom:10px;line-height:1.6;}
.solution-upload-box input[type=file]{font-size:13px;font-family:inherit;}
.solution-file-name{margin-top:8px;font-size:12.5px;color:var(--teal);font-weight:700;}

.result-q-explain{
  margin-top:8px;padding:10px 12px;background:var(--violet-soft);border-radius:8px;
  font-family:'Noto Serif KR',serif;font-size:13px;line-height:1.65;color:var(--ink);
}
.rq-explain-label{font-family:'Noto Sans KR',sans-serif;font-weight:700;color:var(--violet);margin-bottom:8px;}
.result-q-explain-img{text-align:center;margin-top:8px;}
.result-q-explain-img img{max-width:100%;height:auto;border-radius:6px;}

/* ---------- 문제 PDF 인쇄용 스타일은 printPageCss()에 별도로 있다(아래 참고) ----------
   이 CSS는 메인 퀴즈 화면이 아니라, PDF 버튼으로 여는 새 인쇄 창에 주입된다. */

.quiz-q{border:1px solid var(--line);border-radius:12px;padding:18px 18px 16px;margin-bottom:16px;background:#fff;}
.quiz-q-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--teal-soft);color:var(--teal);font-family:'JetBrains Mono',monospace;font-weight:800;font-size:13px;margin-bottom:10px;}
.quiz-q-stem{font-family:'Noto Serif KR',serif;font-size:15px;line-height:1.7;text-align:justify;word-break:keep-all;}
.quiz-q-stem2{margin-top:8px;}
.quiz-q-img{text-align:center;margin:12px 0;}
.quiz-q-img img{max-width:100%;height:auto;border-radius:6px;}
.quiz-bogi-box{border:1px solid var(--ink);padding:20px 16px 8px;margin:12px 0 4px;position:relative;font-family:'Noto Serif KR',serif;font-size:14px;line-height:1.65;}
.quiz-bogi-box::before{content:"<보 기>";position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:#fff;padding:0 12px;font-size:12px;color:var(--navy);font-family:'Noto Sans KR',sans-serif;font-weight:700;}
.quiz-bogi-item{text-indent:-1.4em;padding-left:1.4em;margin-bottom:4px;}
.quiz-choices{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
.quiz-choice-btn{
  display:flex;align-items:flex-start;gap:10px;width:100%;text-align:left;
  padding:11px 14px;border:1.5px solid #C7CEDA;border-radius:10px;background:#fff;
  font-family:'Noto Serif KR',serif;font-size:14px;line-height:1.55;color:var(--ink);cursor:pointer;
  transition:border-color .12s, background .12s;
}
.quiz-choice-btn:hover{border-color:var(--teal);background:var(--teal-soft);}
.quiz-choice-btn.selected{border-color:var(--navy);background:#EDF0F7;font-weight:700;}
.quiz-choice-btn .cc-mark{font-family:'JetBrains Mono',monospace;font-weight:800;color:var(--teal);flex:0 0 auto;}
.quiz-choice-btn.disabled{cursor:default;}
.quiz-choice-btn.correct{border-color:var(--teal);background:var(--teal-soft);}
.quiz-choice-btn.wrong{border-color:var(--rose);background:var(--rose-soft);}

.result-score-box{text-align:center;padding:18px 0 22px;border-bottom:1px solid var(--line);margin-bottom:20px;}
.result-score-num{font-family:'JetBrains Mono',monospace;font-weight:900;font-size:44px;color:var(--navy);}
.result-score-label{font-size:13.5px;color:var(--ink-soft);margin-top:4px;}
.result-send-status{text-align:center;font-size:12.5px;color:var(--ink-soft);margin-bottom:18px;}
.result-send-status.ok{color:var(--teal);font-weight:700;}
.result-send-status.fail{color:var(--rose);font-weight:700;}
.result-q{border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.result-q-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12.5px;font-weight:700;}
.result-q-head .rq-badge{font-family:'JetBrains Mono',monospace;color:var(--ink-soft);}
.result-q-head .rq-status{padding:2px 9px;border-radius:99px;font-size:11.5px;}
.result-q-head .rq-status.ok{background:var(--teal-soft);color:var(--teal);}
.result-q-head .rq-status.no{background:var(--rose-soft);color:var(--rose);}
.result-q-detail{font-size:13px;color:var(--ink-soft);font-family:'Noto Serif KR',serif;}
.result-q-detail b{color:var(--ink);}
.rq-correct-mark{
  display:inline-block;font-family:'JetBrains Mono',monospace;font-weight:800;font-size:12.5px;
  color:#fff;background:var(--violet);padding:2px 10px;border-radius:99px;
}
.copyright{text-align:center;color:#9AA2B1;font-size:11.5px;padding:20px 0;}

</style>
</head>
<body>

<header>
  <div class="eyebrow">An's Physics</div>
  <h1 id="quizTitle">역학과 에너지 연습과제 - 01</h1>
</header>

<div class="wrap">

  <!-- 로그인 게이트: 학교 Google 계정 도메인 제한이 설정된 경우에만 표시됨 -->
  <div class="panel" id="screenGate" style="display:none;">
    <h2>🔒 로그인이 필요합니다</h2>
    <p class="sub" id="gateSub">이 퀴즈는 학교 Google 계정으로만 접근할 수 있습니다.</p>
    <div id="googleSignInBtn" class="google-signin-btn-wrap"></div>
    <div class="err-msg gate-err" id="gateError" style="display:none;"></div>
  </div>

  <!-- 시작 화면: 학번/이름 입력 -->
  <div class="panel" id="screenStart">
    <h2>시작하기 전에</h2>
    <p class="sub">학번과 이름을 입력하면 퀴즈가 시작됩니다. 제출하면 바로 채점 결과를 볼 수 있어요.</p>
    <div class="start-row">
      <div class="field">
        <label for="stuId">학번</label>
        <input type="text" id="stuId" placeholder="예: 10203" inputmode="numeric">
      </div>
      <div class="field">
        <label for="stuName">이름</label>
        <input type="text" id="stuName" placeholder="예: 홍길동">
      </div>
    </div>
    <div class="err-msg" id="startErr"></div>
    <button class="btn block" id="startBtn" type="button">시작하기</button>
  </div>

  <!-- 퀴즈 화면 -->
  <div class="panel" id="screenQuiz" style="display:none;">
    <button class="btn ghost sm print-btn" id="printBtn" type="button">📄 PDF로 문제 다운받기</button>
    <div class="quiz-progress-row">
      <div class="quiz-progress-track"><div class="quiz-progress-fill" id="progressFill"></div></div>
      <div class="quiz-progress-text" id="progressText">0 / 0 답변함</div>
    </div>
    <div id="quizList"></div>

    <div class="solution-upload-box">
      <label for="solutionFile">✏️ 풀이 PDF 첨부 (필수)</label>
      <div class="solution-upload-hint">문제를 푼 풀이 과정을 스캔하거나 사진으로 찍어 PDF로 변환한 뒤 첨부해주세요. 제출하면 선생님 구글 드라이브로 함께 전달됩니다.</div>
      <input type="file" id="solutionFile" accept="application/pdf,.pdf">
      <div class="solution-file-name" id="solutionFileName"></div>
      <div class="err-msg" id="solutionFileErr"></div>
    </div>

    <button class="btn block teal" id="submitBtn" type="button">제출하기</button>
  </div>

  <!-- 결과 화면 -->
  <div class="panel" id="screenResult" style="display:none;">
    <div class="result-score-box">
      <div class="result-score-num" id="resultScoreNum">-</div>
      <div class="result-score-label" id="resultScoreLabel">정답 - / -</div>
    </div>
    <div class="result-send-status" id="resultSendStatus"></div>
    <button class="btn ghost sm print-btn" id="printAnswerBtn" type="button">🧾 PDF로 해설 다운받기</button>
    <div id="resultList"></div>
  </div>

  <footer class="copyright">슬기로운 학교생활 · 퀴즈 생성기로 만들어짐</footer>
</div>

질량은 무시한다.)","bogi":"","choices":["$m$","$\\sqrt{3}m$","$2m$","$2\\sqrt{3}m$","$4m$"],"correct":4,"explanation":"A에 연결된 두 실이 A에 작용하는 힘은 A에 작용하는 중력과 평형을 이룬다. A와 B를 연결하는 실이 B에 작용하는 힘의 연직 성분은 B에 작용하는 중력과 평형을 이룬다. A의 질량을 $M$, 천장과 A를 연결하는 실이 A에 작용하는 힘의 크기를 $T_1$, A와 B를 연결하는 실이 A에 작용하는 힘의 크기를 $T_2$라고 하면 A에 작용하는 힘이 평형을 이루므로\n\n$T_1 \\cos60^\\circ = T_2 \\sin60^\\circ$,\n\n$T_1 \\sin60^\\circ = T_2 \\cos60^\\circ + Mg$ 이다.\n\n  또, B에 작용하는 힘도 평형을 이루므로 $T_2 \\cos60^\\circ = 2mg$ 이다.\n\n$T_2 = 4mg$이므로 $T_1 = 4\\sqrt{3}mg$이다. 따라서 $M = 4m$","explanationImg":"","explanationImgWidthMm":100,"explanationImgHeightMm":60},{"number":7,"stem1":"그림과 같이 천장에 실로 연결된 물체가 경사각이 $30^\\circ$인 빗면에 놓여 있다. 천장에 연결된 실이 빗면과 이루는 각은 $30^\\circ$이고, 물체의 질량은 $m$이다.","img":"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAX4AAADMCAYAAAB0r8g2AAAAAXNSR0IArs4c6QAAAERlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAABfqADAAQAAAABAAAAzAAAAAClw/rTAABAAElEQVR4Ae3dB5xlRbE/8OPLYgBJkpQFBUkiAiqZJQuyZERABX2AREXlIyAIPBQQhYcYQHJSiYICEkTSkiQoSFSSiCQBkfB8zxf///021tB7d2Z2ZvbOzL1zqz+fM+fc06m6+syvq6urq1/3/6aFJkNyYCYc8Jm87nWva5577rly/d///d9McmR0J3DgjW98Y7PwwguXvtNnf/M3f9MJZCUN48yBvxvn+rP6LuMA8Pjv//7vBJAu67ckNzlQcyCBv+ZGPg/IAdK+8D//8z/l+tu//dsB02ZE53AgJ/Sd0xedREkCfyf1RgfTQtIHIv/7v/9b1AbuEWJQiN812Aw1rs6jnDpfO+Lq8pRflznacXVdY922qFv/tbYTLRl6kwMJ/L3Z7yNqNf0wABFq4G+V/geKA0KRXxl1vhhYvBfquLq8weIAW63DrvMNFidPDYp1vpoOdQ8U16lt+8///M9CM/7+wz/8gyZkSA40Cfz5EQyJA1Q8f//3f98Akr/7u7+bDsBrMFdYDb5DjQO8NfjW+erylD+SuFZgrssU54pQx9V1iR9J3Hi2DdirX58ZtFoHsmhz3nuLAwn8vdXfI24t0Bfuueee5uqrry56/iisloK9q8GljgNANXDWcd7XwF/H1eUpf6C4VnCv8w0WB9xr4K/z1XV1Y9tY9Hz+858v0n7Ne23J0LscSODv3b4fVsuBI0B8/etf37zpTW8qEuSwCuiwxAYZoA4MH3jggWKi+v73v7/5x3/8x+kGoA4je9jk6KsYcKMPh11IZphwHHjdNEnntTnuhGteNqjdHPC5AMxaKm53HWNR3n/9138V1dVLL73UHHzwwc2qq67afPjDHy5qpIkkGQN9bdVv+ozKJ0NyIL+C/AaGxIHQdce92+UFAGg/wpVXXtnMPffczYYbblgGNO2rVU5DYk4HJ9IeajqD9URqVwezvCtIS+Dvim4afyJDCg7wiPv4UzYyCgDh008/3dx3333NFlts0djhqo2h/hlZqZ2bq9tnaJ3L2dcoIwx1y/9FAv9r/ZZPQ+BAt3zYM2sK9cevfvWrsmax   var PRINT_PAGE_CSS = "\n@page{ size:A4; margin:0; }\nhtml,body{background:#fff;margin:0;padding:0;}\n\n/* 문항 하나(또는 해설 하나) = A4 한 페이지. 예전에 min-height:285mm + 15mm 여백을\n   쓰다 보니 그림·보기박스가 있는 문항이 실제로는 한 페이지에 안 들어가 2페이지로\n   넘치는 경우가 있었다(8문항이 16페이지가 되는 원인). 여백과 글자 크기를 약간\n   줄여 한 페이지 안에 안정적으로 들어가도록 여유를 더 뒀다. */\n.a4-page{\n  width:210mm;min-height:297mm;background:#fff;padding:12mm 15mm;box-sizing:border-box;\n  font-family:'Noto Serif KR',serif;font-size:10.5pt;line-height:1.42;color:#1B2430;\n  display:flex;flex-direction:column;margin:0 auto;\n}\n@media print{ .a4-page{ page-break-after:always; } }\n.a4-page:last-child{ page-break-after:auto; }\n\n/* 모든 페이지에 똑같이 반복되는 머리글. 문제 PDF의 첫 페이지에만 학번·성명이 붙는다. */\n.print-page-header{\n  display:flex;justify-content:space-between;align-items:flex-end;gap:14px;\n  font-family:'Noto Sans KR',sans-serif;border-bottom:2px solid #213863;padding-bottom:6px;margin-bottom:14px;\n}\n.print-page-header .pph-title{font-size:14pt;font-weight:900;}\n.print-page-header .pph-student{font-size:10.5pt;white-space:nowrap;color:#1B2430;}\n\n.ws-stem{text-align:justify;margin-bottom:10px;}\n.ws-qnum{font-size:13pt;font-weight:700;}\n.ws-stem-intro{display:flex;align-items:baseline;text-align:justify;}\n.ws-stem-intro .ws-qnum{flex:0 0 auto;margin-right:0.3em;}\n.ws-stem-intro .ws-stem-text{flex:1;min-width:0;}\n.ws-stem-q2{text-indent:1em;}\n.ws-image{text-align:center;margin:8px 0;}\n.ws-image img{max-width:100%;max-height:85mm;object-fit:contain;}\n.ws-bogi-box{border:1px solid #1B2430;padding:18px 16px 8px;margin:8px 0;position:relative;line-height:1.55;}\n.ws-bogi-box::before{content:\"<보  기>\";position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:#fff;padding:0 14px;font-size:10.5pt;color:#213863;}\n.ws-bogi-item{text-indent:-1.5em;padding-left:1.5em;margin-bottom:4px;}\n.ws-bogi-item:last-child{margin-bottom:0;}\n.ws-choices{display:grid;grid-template-columns:repeat(5,1fr);margin-top:8px;font-size:10pt;}\n\n/* 해설 페이지 */\n.ws-ans-head{display:flex;align-items:baseline;gap:12px;margin-bottom:10px;font-family:'Noto Sans KR',sans-serif;}\n.ws-ans-num{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:14pt;color:#213863;}\n.ws-ans-explain{font-size:10.5pt;line-height:1.7;text-align:justify;word-break:keep-all;margin-top:6px;}\n.rq-explain-label{font-family:'Noto Sans KR',sans-serif;font-weight:700;color:#6E56A6;margin-bottom:8px;}\n\n/* \"정답\"을 확실히 눈에 띄게: 배지 형태로 진하게 강조 */\n.ans-mark-badge{\n  display:inline-block;font-family:'JetBrains Mono',monospace;font-weight:800;font-size:12pt;\n  color:#fff;background:#6E56A6;padding:3px 14px;border-radius:99px;\n}\n";
  var CHOICE_MARK = ['①','②','③','④','⑤'];

  function escapeHtml(s){
    return String(s || '').replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function nl2br(s){ return escapeHtml(s).replace(/\n/g, '<br>'); }

  /** 문자열을 32비트 정수 시드로 바꾼다(FNV-1a 해시). 학번+이름이 같으면 항상 같은 시드가 나온다. */
  function hashSeed(str){
    var h = 2166136261;
    for (var i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }
  /** mulberry32: 시드 하나로 항상 같은 난수열을 만들어내는 간단한 결정론적 PRNG */
  function mulberry32(seed){
    var s = seed >>> 0;
    return function(){
      s = (s + 0x6D2B79F5) | 0;
      var t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  /** rng()를 이용한 결정론적 셔플(Fisher-Yates). rng가 같은 시드에서 시작하면 결과도 항상 같다. */
  function seededShuffle(arr, rng){
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }
  function buildBogiHtml(bogi){
    return bogi.split('\n').filter(function(l){ return l.trim(); })
      .map(function(l){ return '<div class="quiz-bogi-item">' + escapeHtml(l) + '</div>'; })
      .join('');
  }

  function buildPrintBogiHtml(bogi){
    return bogi.split('\n').filter(function(l){ return l.trim(); })
      .map(function(l){ return '<div class="ws-bogi-item">' + escapeHtml(l) + '</div>'; })
      .join('');
  }

  // 문항 순서/선택지 순서는 "학번+이름"에서 뽑아낸 시드로 결정한다.
  // 같은 학생(같은 학번+이름)은 언제 다시 열어도 항상 같은 문항·선지 순서를 보고,
  // 다른 학생은 서로 다른 순서를 보게 된다. 실제 셔플은 시작하기를 누른 뒤(학번/이름을
  // 알고 난 뒤) applyShuffle()에서 수행한다.
  var questions = raw.questions.map(function(q, i){
    return Object.assign({}, q, { origIndex: i, choiceOrder: [0,1,2,3,4] });
  });

  function applyShuffle(studentId, studentName){
    var seed = hashSeed(studentId.trim() + '||' + studentName.trim());
    var rng = mulberry32(seed);
    // 먼저 원래 문항 순서(origIndex 기준)로 각 문항의 선지 순서를 정한다.
    questions.forEach(function(q){
      q.choiceOrder = raw.shuffleChoices ? seededShuffle([0,1,2,3,4], rng) : [0,1,2,3,4];
    });
    // 그 다음 문항 자체의 노출 순서를 섞는다(선지 셔플과 같은 rng 스트림을 이어서 사용).
    if (raw.shuffleQuestions) questions = seededShuffle(questions, rng);
  }

  var answers = {}; // origIndex -> 선택한 원래 선지 인덱스(0~4)

  var elStart = document.getElementById('screenStart');
  var elQuiz = document.getElementById('screenQuiz');
  var elResult = document.getElementById('screenResult');
  var elQuizList = document.getElementById('quizList');
  var elProgressFill = document.getElementById('progressFill');
  var elProgressText = document.getElementById('progressText');

  var elGate = document.getElementById('screenGate');

  document.getElementById('quizTitle').textContent = raw.title || '퀴즈';

  /** base64url(JWT에서 쓰는 인코딩) 디코딩 */
  function base64UrlDecode(str){
    str = str.replace(/-/g, '+').replace(/_/g, '/');
    while (str.length % 4) str += '=';
    var decoded = atob(str);
    try {
      return decodeURIComponent(Array.prototype.map.call(decoded, function(c){
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
    } catch (e) {
      return decoded;
    }
  }
  /** Google이 돌려준 ID 토큰(JWT)의 payload 부분만 꺼내 읽는다.
   *  ⚠️ 서명 검증은 하지 않는다(브라우저에서는 할 수 없음). 그래서 이건 "학생이
   *  실수로 다른 계정으로 들어오는 것"을 막는 화면일 뿐, 완전한 보안 경계는 아니다.
   *  실제 검증은 제출 시 Apps Script가 구글 서버에 재확인을 요청해서 처리한다. */
  function parseJwt(token){
    var parts = token.split('.');
    if (parts.length < 2) return null;
    try { return JSON.parse(base64UrlDecode(parts[1])); } catch (e) { return null; }
  }

  function handleGoogleCredential(response){
    var payload = parseJwt(response.credential);
    var gateErrorEl = document.getElementById('gateError');
    if (!payload) {
      gateErrorEl.textContent = '로그인 처리 중 문제가 발생했습니다. 다시 시도해주세요.';
      gateErrorEl.style.display = 'block';
      return;
    }
    var email = (payload.email || '').toLowerCase();
    var verified = payload.email_verified === true || payload.email_verified === 'true';
    var domainOk = email.indexOf('@' + raw.allowedDomain.toLowerCase()) !== -1;

    if (verified && domainOk) {
      gateErrorEl.style.display = 'none';
      window.__stuEmail = payload.email || '';
      window.__idToken = response.credential;
      if (payload.name && !document.getElementById('stuName').value) {
        document.getElementById('stuName').value = payload.name;
      }
      elGate.style.display = 'none';
      elStart.style.display = 'block';
    } else {
      var schoolLabel = raw.schoolName ? (raw.schoolName + ' ') : '';
      gateErrorEl.textContent = schoolLabel + '구글 계정(@' + raw.allowedDomain + ')을 통해서 접근 가능합니다.';
      gateErrorEl.style.display = 'block';
      if (window.google && google.accounts && google.accounts.id) {
        google.accounts.id.disableAutoSelect();
      }
    }
  }

  if (raw.gateEnabled) {
    elStart.style.display = 'none';
    elGate.style.display = 'block';
    document.getElementById('gateSub').textContent =
      (raw.schoolName ? (raw.schoolName + '의 ') : '') + '구글 계정(@' + raw.allowedDomain + ')으로 로그인해주세요.';

    (function initGoogleGate(){
      if (!(window.google && google.accounts && google.accounts.id)) {
        setTimeout(initGoogleGate, 200);
        return;
      }
      google.accounts.id.initialize({ client_id: raw.googleClientId, callback: handleGoogleCredential });
      google.accounts.id.renderButton(
        document.getElementById('googleSignInBtn'),
        { theme: 'outline', size: 'large', text: 'signin_with', width: 280 }
      );
    })();
  }

  function renderQuestion(q, displayIdx){
    var choicesHtml = q.choiceOrder.map(function(origCi, shownIdx){
      return '<button type="button" class="quiz-choice-btn" data-qidx="' + q.origIndex + '" data-orig-ci="' + origCi + '">' +
        '<span class="cc-mark">' + CHOICE_MARK[shownIdx] + '</span><span class="cc-text">' + escapeHtml(q.choices[origCi]) + '</span>' +
      '</button>';
    }).join('');
    return '' +
      '<div class="quiz-q" id="q-' + q.origIndex + '">' +
        '<div class="quiz-q-badge">' + (displayIdx + 1) + '</div>' +
        '<div class="quiz-q-stem">' + nl2br(q.stem1) + '</div>' +
        (q.img ? '<div class="quiz-q-img"><img src="' + q.img + '" style="width:' + (q.imgWidthMm || 100) + 'mm;"></div>' : '') +
        '<div class="quiz-q-stem quiz-q-stem2">' + nl2br(q.stem2) + '</div>' +
        (q.bogi && q.bogi.trim() ? '<div class="quiz-bogi-box">' + buildBogiHtml(q.bogi) + '</div>' : '') +
        '<div class="quiz-choices">' + choicesHtml + '</div>' +
      '</div>';
  }

  function updateProgress(){
    var answered = Object.keys(answers).length;
    var pct = questions.length ? Math.round((answered / questions.length) * 100) : 0;
    elProgressFill.style.width = pct + '%';
    elProgressText.textContent = answered + ' / ' + questions.length + ' 답변함';
  }

  function renderQuiz(){
    elQuizList.innerHTML = questions.map(function(q, i){ return renderQuestion(q, i); }).join('');
    elQuizList.querySelectorAll('.quiz-choice-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var qidx = Number(btn.dataset.qidx);
        var origCi = Number(btn.dataset.origCi);
        answers[qidx] = origCi;
        var group = document.getElementById('q-' + qidx).querySelectorAll('.quiz-choice-btn');
        group.forEach(function(b){ b.classList.toggle('selected', Number(b.dataset.origCi) === origCi); });
        updateProgress();
      });
    });
    updateProgress();
    if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([elQuizList]);
  }

  /** 모든 페이지에 똑같이 나오는 머리글(퀴즈 제목). 문제 PDF의 첫 페이지에만
   *  학번·성명을 덧붙인다(요청: "1페이지에만 학번/성명, 2페이지부터는 뺀 동일한 머릿글"). */
  function buildPageHeaderHtml(titleSuffix, includeStudent){
    return '' +
      '<div class="print-page-header">' +
        '<span class="pph-title">' + escapeHtml(raw.title) + (titleSuffix ? ' ' + titleSuffix : '') + '</span>' +
        (includeStudent
          ? '<span class="pph-student">학번: ' + escapeHtml(window.__stuId || '') + '&nbsp;&nbsp;&nbsp;성명: ' + escapeHtml(window.__stuName || '') + '</span>'
          : '') +
      '</div>';
  }

  /** 문항 하나 = A4 한 페이지. 페이지마다 같은 머리글이 반복되고, 첫 페이지에만
   *  학번·성명이 붙는다. */
  function buildQuestionPageHtml(q, i){
    var marks = ['①','②','③','④','⑤'];
    return '' +
      '<div class="a4-page">' +
        buildPageHeaderHtml('', i === 0) +
        '<div class="ws-stem ws-stem-intro"><span class="ws-qnum">' + (i + 1) + '.</span><span class="ws-stem-text">' + nl2br(q.stem1) + '</span></div>' +
        (q.img ? '<div class="ws-image"><img src="' + q.img + '" style="width:' + (q.imgWidthMm || 100) + 'mm;height:' + (q.imgHeightMm || 60) + 'mm;"></div>' : '') +
        '<div class="ws-stem ws-stem-q2">' + nl2br(q.stem2) + '</div>' +
        (q.bogi && q.bogi.trim() ? '<div class="ws-bogi-box">' + buildPrintBogiHtml(q.bogi) + '</div>' : '') +
        '<div class="ws-choices">' + q.choiceOrder.map(function(origCi, si){
          return '<div>' + marks[si] + ' ' + escapeHtml(q.choices[origCi]) + '</div>';
        }).join('') + '</div>' +
      '</div>';
  }

  function buildQuestionDocHtml(){
    return questions.map(function(q, i){ return buildQuestionPageHtml(q, i); }).join('');
  }

  /**
   * MathJax 렌더링이 끝난 뒤 자동으로 인쇄되는 새 창을 연다("문제 PDF"/"해설 PDF" 공용).
   * ⚠️ 예전에 여기서 16페이지(8문항인데)가 나오던 버그의 원인: MathJax가 수식마다
   * 스크린리더용 숨김 텍스트(assistive MML)를 같이 만드는데, 브라우저에 따라 인쇄
   * 페이지 나누기 계산이 이 숨김 요소를 별도 페이지로 잘못 쪼개는 경우가 있었다.
   * 이 PDF들은 화면 판독기로 읽을 상황이 아니라서(학생이 직접 저장/인쇄하는 용도)
   * 아예 생성하지 않도록 껐다.
   * @returns {boolean} 성공적으로 창을 열었는지(팝업 차단 여부)
   */
  function openPrintWindow(titleSuffix, bodyHtml){
    var printWin = window.open('', '_blank', 'width=900,height=1000');
    if (!printWin) {
      window.alert('팝업이 차단되어 ' + titleSuffix + '을 열 수 없습니다. 이 사이트의 팝업 차단을 해제한 뒤 다시 시도해주세요.');
      return false;
    }
    printWin.document.open();
    printWin.document.write(
      '<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">' +
      '<title>' + escapeHtml(raw.title) + ' - ' + titleSuffix + '</title>' +
      '<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">' +
      '<style>' + PRINT_PAGE_CSS + '</style>' +
      '<script>' +
      'window.MathJax = {' +
      'tex:{inlineMath:[["$","$"]],displayMath:[["$$","$$"]]},' +
      'svg:{fontCache:"global"},' +
      'options:{enableAssistiveMml:false},' +
      'startup:{ready:function(){' +
      'MathJax.startup.defaultReady();' +
      'MathJax.startup.promise.then(function(){ setTimeout(function(){ window.focus(); window.print(); }, 80); });' +
      '}}' +
      '};' +
      '<\/script>' +
      '<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"><\/script>' +
      '</head><body>' + bodyHtml + '</body></html>'
    );
    printWin.document.close();
    printWin.addEventListener('afterprint', function(){ printWin.close(); });
    return true;
  }

  document.getElementById('printBtn').addEventListener('click', function(){
    openPrintWindow('문제지', buildQuestionDocHtml());
  });

  /** "PDF로 해설 다운받기"용 본문(정답+해설+해설그림). 문항 순서는 결과 화면과
   *  마찬가지로 학생이 실제로 문제를 풀었던 순서(문항 섞기를 켰다면 학생마다 다름)
   *  그대로 쓴다 — md 원본 번호 순으로 다시 정렬하면 결과 화면과 순서가 어긋나
   *  헷갈린다. 정답 마크(①~⑤)도 "문제 PDF"·결과 화면과 똑같이 이 학생이 실제로
   *  본 선지 순서 기준으로 계산한다. */
  function buildAnswerDocHtml(){
    var marks = ['①','②','③','④','⑤'];
    return questions.map(function(q, i){
      var hasExplanation = !!(q.explanation && q.explanation.trim());
      var hasExplanationImg = !!q.explanationImg;
      var correctDisplayPos = q.choiceOrder ? q.choiceOrder.indexOf(q.correct) : q.correct;
      return '' +
        '<div class="a4-page">' +
          buildPageHeaderHtml('— 정답 및 해설', false) +
          '<div class="ws-ans-head"><span class="ws-ans-num">' + (i + 1) + '번</span><span class="ans-mark-badge">정답 ' + marks[correctDisplayPos] + '</span></div>' +
          (hasExplanation ? '<div class="ws-ans-explain"><div class="rq-explain-label">해설</div>' + nl2br(q.explanation) + '</div>' : '') +
          (hasExplanationImg ? '<div class="ws-image"><img src="' + q.explanationImg + '" style="width:' + (q.explanationImgWidthMm || 100) + 'mm;height:' + (q.explanationImgHeightMm || 60) + 'mm;"></div>' : '') +
        '</div>';
    }).join('');
  }

  document.getElementById('printAnswerBtn').addEventListener('click', function(){
    openPrintWindow('정답 및 해설', buildAnswerDocHtml());
  });

  document.getElementById('solutionFile').addEventListener('change', function(){
    var f = this.files && this.files[0];
    var nameEl = document.getElementById('solutionFileName');
    nameEl.textContent = f ? ('첨부됨: ' + f.name + ' (' + (f.size / 1024 / 1024).toFixed(1) + 'MB)') : '';
  });

  document.getElementById('startBtn').addEventListener('click', function(){
    var id = document.getElementById('stuId').value.trim();
    var name = document.getElementById('stuName').value.trim();
    var err = document.getElementById('startErr');
    if (!id || !name) { err.textContent = '학번과 이름을 모두 입력해주세요.'; return; }
    if (!/^\d{5}$/.test(id)) { err.textContent = '학번은 숫자 5자리로 입력해주세요. (예: 10203)'; return; }
    err.textContent = '';
    window.__stuId = id; window.__stuName = name;

    var startBtn = document.getElementById('startBtn');
    startBtn.disabled = true;
    var origStartLabel = startBtn.textContent;
    startBtn.textContent = '확인 중…';

    checkPriorSubmission(id, window.__stuEmail).then(function(prior){
      startBtn.disabled = false;
      startBtn.textContent = origStartLabel;
      if (prior && prior.found) {
        // 이전 제출 결과를 보여줄 때도, 그때 그 학생이 실제로 봤던 문항·선지 순서를
        // 그대로 재현해야 "내 답/정답" 번호가 그 학생 화면 기준으로 맞게 나온다.
        // 셔플은 학번+이름으로 결정되는 시드 기반이라, 같은 학번+이름이면 항상 같은
        // 순서가 재현된다(따로 저장해둘 필요가 없음).
        applyShuffle(id, name);
        showPriorResult(prior);
        return;
      }
      applyShuffle(id, name);
      elStart.style.display = 'none';
      elQuiz.style.display = 'block';
      renderQuiz();
    });
  });

  /**
   * 이 학생(학번 기준, 이메일이 있으면 이메일도 함께 확인)이 이 퀴즈에 이미 제출한
   * 적이 있는지 구글시트에 물어본다. JSONP로 확인한다(Apps Script는 fetch로 읽을 수
   * 있는 CORS 응답을 안 주기 때문에, <script> 태그로 우회하는 표준적인 방법을 쓴다).
   * gasUrl이 없거나 확인에 실패하면(네트워크 문제 등) "없음"으로 간주해 정상적으로
   * 퀴즈를 시작하게 한다 — 이 확인은 편의 기능이지, 이것 때문에 학생이 퀴즈를 아예
   * 못 푸는 상황이 생기면 안 되기 때문이다.
   */
  function checkPriorSubmission(studentId, studentEmail){
    return new Promise(function(resolve){
      if (!raw.gasUrl) { resolve({ found: false }); return; }
      var cbName = '__quizCheckCb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
      var script = document.createElement('script');
      var done = false;
      var timeoutId = setTimeout(function(){ finish({ found: false }); }, 6000);
      function finish(data){
        if (done) return;
        done = true;
        clearTimeout(timeoutId);
        delete window[cbName];
        if (script.parentNode) script.parentNode.removeChild(script);
        resolve(data || { found: false });
      }
      window[cbName] = finish;
      script.onerror = function(){ finish({ found: false }); };
      var sep = raw.gasUrl.indexOf('?') === -1 ? '?' : '&';
      script.src = raw.gasUrl + sep +
        'action=check&quizTitle=' + encodeURIComponent(raw.title) +
        '&studentId=' + encodeURIComponent(studentId) +
        '&studentEmail=' + encodeURIComponent(studentEmail || '') +
        '&callback=' + cbName;
      document.head.appendChild(script);
    });
  }

  /** 이전 제출 기록(시트에 저장된 O/X, "원본 선지 번호" 기준 선택 마크)을, 방금
   *  applyShuffle()로 재현한 "그 학생이 실제로 봤던 화면 순서"에 맞춰 다시 계산해
   *  결과 화면을 그대로 재구성해 보여준다. 제출 화면(screenQuiz)은 아예 건너뛰어
   *  재제출을 막는다. */
  function showPriorResult(prior){
    var okArr = String(prior.okMarks || '').split(',');
    var choiceArr = String(prior.choiceMarks || '').split(',');
    // ⚠️ 시트에 저장된 okArr/choiceArr는 항상 "원본 번호 순"(인덱스 i = 번호 i+1)이다.
    // 화면에는 raw.questions(항상 원본 순서)가 아니라 questions(방금 applyShuffle로
    // 이 학생의 화면 순서를 재현한 배열)를 그대로 순회해야, 그때 그 학생이 실제로
    // 봤던 문항 순서 그대로 결과가 나온다. 각 문항의 O/X·선택 마크는 원본 번호로
    // okArr/choiceArr에서 찾아온다.
    var detail = questions.map(function(q, idx){
      var i = q.number - 1;
      var chosenOrigMark = choiceArr[i];
      var chosenOrigCi = (chosenOrigMark && chosenOrigMark !== '-') ? CHOICE_MARK.indexOf(chosenOrigMark) : -1;
      var chosenDisplayPos = (chosenOrigCi === -1 || !q.choiceOrder) ? -1 : q.choiceOrder.indexOf(chosenOrigCi);
      var correctDisplayPos = q.choiceOrder ? q.choiceOrder.indexOf(q.correct) : q.correct;
      return {
        number: q.number,
        displayNumber: idx + 1,
        chosenDisplayMark: chosenDisplayPos === -1 ? null : CHOICE_MARK[chosenDisplayPos],
        correctDisplayMark: CHOICE_MARK[correctDisplayPos],
        isCorrect: okArr[i] === 'O',
        explanation: q.explanation || '',
        explanationImg: q.explanationImg || '',
        explanationImgWidthMm: q.explanationImgWidthMm || 100,
        explanationImgHeightMm: q.explanationImgHeightMm || 60,
      };
    });
    var score = (prior.score !== undefined && prior.score !== '')
      ? Number(prior.score)
      : detail.filter(function(d){ return d.isCorrect; }).length;

    elStart.style.display = 'none';
    renderResult(score, raw.questions.length, detail, 'already');
    var whenText = prior.submittedAt ? ' (제출 시각: ' + prior.submittedAt + ')' : '';
    var statusEl = document.getElementById('resultSendStatus');
    statusEl.textContent = '이미 이 퀴즈에 제출한 기록이 있어 이전 결과를 보여드립니다.' + whenText;
    statusEl.className = 'result-send-status';
  }

  function lockChoices(){
    elQuizList.querySelectorAll('.quiz-choice-btn').forEach(function(btn){ btn.classList.add('disabled'); btn.disabled = true; });
  }

  function renderResult(score, total, detail, sendState, hasFile){
    document.getElementById('resultScoreNum').textContent = score + ' / ' + total;
    document.getElementById('resultScoreLabel').textContent =
      total ? Math.round((score / total) * 100) + '점' : '-';

    var statusEl = document.getElementById('resultSendStatus');
    if (sendState === 'already') {
      statusEl.textContent = '';
      statusEl.className = 'result-send-status';
    } else if (!raw.gasUrl) {
      statusEl.textContent = '이 결과는 이 화면에서만 확인할 수 있어요(선생님께 별도로 전달되지 않음).';
    } else if (sendState === 'ok') {
      statusEl.textContent = '✅ 결과가 선생님께 전송되었습니다.' + (hasFile ? ' (풀이 PDF 포함)' : '');
      statusEl.className = 'result-send-status ok';
    } else {
      statusEl.textContent = '⚠️ 결과 전송에 실패했습니다(네트워크 확인). 이 화면을 캡처해서 선생님께 보여주세요.';
      statusEl.className = 'result-send-status fail';
    }

    var listEl = document.getElementById('resultList');
    // ⚠️ 여기서 번호순으로 다시 정렬하지 않는다. detail은 이미 "학생이 실제로 문제를
    // 풀었던 순서"(문항 섞기를 켰다면 학생마다 다름)로 전달되며, 결과 화면은 그
    // 순서를 그대로 보여줘야 학생이 방금 푼 순서와 일치해 헷갈리지 않는다.
    listEl.innerHTML = detail.map(function(d){
      return '' +
        '<div class="result-q">' +
          '<div class="result-q-head">' +
            '<span class="rq-badge">' + d.displayNumber + '번</span>' +
            '<span class="rq-status ' + (d.isCorrect ? 'ok' : 'no') + '">' + (d.isCorrect ? '정답' : '오답') + '</span>' +
          '</div>' +
          '<div class="result-q-detail">내 답: <b>' + (d.chosenDisplayMark || '무응답') + '</b> · 정답: <span class="rq-correct-mark">' + d.correctDisplayMark + '</span></div>' +
          (d.explanation && d.explanation.trim() ? '<div class="result-q-explain"><div class="rq-explain-label">해설</div>' + nl2br(d.explanation) + '</div>' : '') +
          (d.explanationImg ? '<div class="result-q-explain-img"><img src="' + d.explanationImg + '" style="width:' + (d.explanationImgWidthMm || 100) + 'mm;height:' + (d.explanationImgHeightMm || 60) + 'mm;"></div>' : '') +
        '</div>';
    }).join('');

    elQuiz.style.display = 'none';
    elResult.style.display = 'block';
    if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([listEl]);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /** 파일을 base64 문자열로 읽는다(데이터 URL 접두어는 제거). */
  function readFileAsBase64(file){
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onload = function(){
        var result = reader.result || '';
        var idx = result.indexOf(',');
        resolve(idx === -1 ? result : result.slice(idx + 1));
      };
      reader.onerror = function(){ reject(new Error('파일을 읽지 못했습니다.')); };
      reader.readAsDataURL(file);
    });
  }

  document.getElementById('submitBtn').addEventListener('click', function(){
    var answeredCount = Object.keys(answers).length;
    if (answeredCount < questions.length) {
      var proceed = window.confirm(
        '아직 답하지 않은 문항이 ' + (questions.length - answeredCount) + '개 있습니다. 그래도 제출할까요?'
      );
      if (!proceed) return;
    }

    var solutionInput = document.getElementById('solutionFile');
    var solutionFile = solutionInput.files && solutionInput.files[0];
    var solutionFileErrEl = document.getElementById('solutionFileErr');
    solutionFileErrEl.textContent = '';
    if (!solutionFile) {
      solutionFileErrEl.textContent = '풀이 PDF를 첨부해야 제출할 수 있습니다.';
      if (solutionInput.scrollIntoView) solutionInput.scrollIntoView({ block: 'center' });
      return;
    }
    if (solutionFile.size > 15 * 1024 * 1024) {
      var proceedBig = window.confirm(
        '첨부한 파일이 꽤 큽니다(' + (solutionFile.size / 1024 / 1024).toFixed(1) + 'MB). 전송에 시간이 걸리거나 실패할 수 있어요. 그래도 제출할까요?'
      );
      if (!proceedBig) return;
    }

    var score = 0;
    var detail = questions.map(function(q, idx){
      var chosenCi = answers[q.origIndex];
      var isCorrect = chosenCi === q.correct;
      if (isCorrect) score++;
      var chosenDisplayPos = chosenCi === undefined ? -1 : q.choiceOrder.indexOf(chosenCi);
      var correctDisplayPos = q.choiceOrder.indexOf(q.correct);
      return {
        number: q.number,
        // ⚠️ number는 "원본 .md 파일" 기준 문항 번호(교사 시트 전송·집계용, 이전
        // 제출 조회 시 매칭용). displayNumber는 이 학생이 퀴즈 화면에서 실제로 본
        // 순번("N번" 배지에 쓰인 그 숫자, 문항 섞기를 켰으면 학생마다 달라짐) —
        // 결과 화면·해설 PDF는 반드시 이걸 써야 한다. 예전엔 여기서도 원본 번호를
        // 그대로 써서, 학생이 화면에서 "1번"으로 풀었던 문항이 결과에는 "7번"으로
        // 나오는 버그가 있었다.
        displayNumber: idx + 1,
        // ⚠️ chosenMark/correctMark는 "원본" 선지 번호 기준(교사 시트 전송·집계용).
        // chosenDisplayMark/correctDisplayMark는 이 학생이 화면에서 실제로 본 순서
        // 기준(선지 섞기를 켰으면 학생마다 달라짐) — 화면에는 반드시 이걸 써야
        // 학생이 자기가 클릭한 번호와 "정답 번호"가 서로 다른 기준으로 보여
        // 헷갈리는 일이 없다.
        chosenMark: (chosenCi === undefined) ? null : CHOICE_MARK[chosenCi],
        correctMark: CHOICE_MARK[q.correct],
        chosenDisplayMark: chosenDisplayPos === -1 ? null : CHOICE_MARK[chosenDisplayPos],
        correctDisplayMark: CHOICE_MARK[correctDisplayPos],
        isCorrect: isCorrect,
        explanation: q.explanation || '',
        explanationImg: q.explanationImg || '',
        explanationImgWidthMm: q.explanationImgWidthMm || 100,
        explanationImgHeightMm: q.explanationImgHeightMm || 60,
      };
    });
    // ⚠️ 이전 버그: 아래 정렬을 detail 배열 자체에 직접(in-place) 적용해서, 화면에
    // 보여줄 때도 이 "원본 순서로 정렬된" 배열이 그대로 쓰여버렸다. 그 결과 학생
    // 화면에서는 문항이 섞여 나왔는데 결과 화면·해설 PDF는 항상 md 원본 순서로
    // 나오는 버그가 생겼다. 교사가 구글시트에서 학생별로 같은 문항을 같은 열에서
    // 비교하려면 시트로 보내는 데이터만 원본 번호 순으로 정렬하면 되므로, 별도의
    // "사본"을 만들어 그쪽에만 정렬을 적용하고, 화면 표시용 detail은 학생이 실제로
    // 문제를 풀었던 순서 그대로 둔다.
    var detailForSheet = detail.slice().sort(function(a, b){ return a.number - b.number; });

    lockChoices();
    var submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    var origSubmitLabel = submitBtn.textContent;
    submitBtn.textContent = '제출 중…';

    var gasPayload = {
      quizTitle: raw.title,
      studentId: window.__stuId,
      studentName: window.__stuName,
      studentEmail: window.__stuEmail || '',
      idToken: window.__idToken || '',
      allowedDomain: raw.allowedDomain || '',
      submittedAt: new Date().toISOString(),
      score: score,
      total: questions.length,
      percent: questions.length ? Math.round((score / questions.length) * 100) : 0,
      detail: detailForSheet,
    };

    var filePromise = solutionFile
      ? readFileAsBase64(solutionFile).then(function(b64){
          gasPayload.solutionFileBase64 = b64;
          gasPayload.solutionFileName = solutionFile.name;
          gasPayload.solutionFileMime = solutionFile.type || 'application/pdf';
        }).catch(function(err){
          console.warn('[퀴즈] 풀이 파일 읽기 실패(파일 없이 제출됨):', err);
        })
      : Promise.resolve();

    filePromise.then(function(){
      var hasFile = !!gasPayload.solutionFileBase64;
      if (!raw.gasUrl) {
        renderResult(score, questions.length, detail, 'none', hasFile);
        return;
      }
      return fetch(raw.gasUrl, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(gasPayload),
      }).then(function(){
        renderResult(score, questions.length, detail, 'ok', hasFile);
      }).catch(function(err){
        console.warn('[퀴즈] 결과 전송 실패:', err);
        renderResult(score, questions.length, detail, 'fail', hasFile);
      });
    }).finally(function(){
      submitBtn.textContent = origSubmitLabel;
    });
  });
})();

</script>
</body>
