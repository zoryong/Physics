<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연습과제 01 · 벡터</title>
<meta name="description" content="역학과 에너지 연습과제 01 벡터 - An's Physics">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#1B2430; --ink-soft:#57616F; --line:#E2E6EB; --paper:#F6F7F9; --card:#FFFFFF;
  --navy:#213863; --navy-deep:#152540; --teal:#0F8A82; --teal-soft:#E3F4F1;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;line-height:1.5;}

header{
  background:linear-gradient(155deg,var(--navy-deep) 0%,var(--navy) 62%,#2B4C7E 100%);
  color:#fff;padding:44px 24px 52px;text-align:center;
}
header .eyebrow{font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:#9FB3D6;font-weight:700;margin-bottom:10px;}
header h1{margin:0 0 10px;font-size:clamp(22px,5vw,30px);font-weight:900;letter-spacing:-.01em;}
header p{margin:0;color:#C7D4E8;font-size:14.5px;}

.wrap{max-width:720px;margin:-28px auto 0;padding:0 20px 60px;}

.panel{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:44px 28px;text-align:center;box-shadow:0 1px 3px rgba(21,37,64,.06);
}
.panel .badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:64px;height:64px;border-radius:50%;margin-bottom:18px;
  background:var(--teal-soft);color:var(--teal);
  font-family:'JetBrains Mono',monospace;font-weight:800;font-size:22px;
}
.panel h2{margin:0 0 8px;font-size:20px;font-weight:800;}
.panel .status{font-size:14px;color:var(--ink-soft);margin:0 0 24px;}

.back{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 20px;border-radius:999px;
  background:var(--navy);color:#fff;text-decoration:none;
  font-size:14px;font-weight:700;transition:background .12s;
}
.back:hover{background:var(--navy-deep);}

footer.copyright{margin-top:36px;font-size:11.5px;color:#9AA2B1;text-align:center;}
footer.copyright a{color:#9AA2B1;text-decoration:underline;text-underline-offset:2px;}
footer.copyright a:hover{color:var(--teal);}
</style>
</head>
<body>

<header>
  <div class="eyebrow">An's Physics</div>
  <h1>연습과제 01 · 벡터</h1>
  <p>역학과 에너지</p>
</header>

<div class="wrap">
  <div class="panel">
    <div class="badge">01</div>
    <h2>준비 중입니다</h2>
    <p class="status">이 연습과제는 현재 준비 중입니다. 곧 공개될 예정입니다.</p>
    <a class="back" href="index.html">← 목록으로 돌아가기</a>
  </div>

  <footer class="copyright">Copyright © 2026 <a href="mailto:physicsgon@gmail.com">physicsgon@gmail.com</a> . All rights reserved.</footer>
</div>

</body>
</html>
